server:
  port: 9080

spring:
  application:
    name: ECOMMERCE-APIGATEWAY

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ECOMMERCE-ORDER-SERVICE
          predicates:
            - Path=/order/**

        - id: product-service
          uri: lb://ECOMMERCE-PRODUCT-SERVICE
          predicates:
            - Path=/product/**

        - id: inventory-service
          uri: lb://ECOMMERCE-INVENTORYSERVICE
          predicates:
            - Path=/inventory/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka