services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db2
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata

  employee-service:
    build: ./EMS1-EmployeeService
    ports:
      - "7071:7071"
    depends_on:
      - oracle-db

  address-service:
    build: ./EMS2-AddressService
    ports:
      - "7072:7072"
    depends_on:
      - oracle-db

volumes:
  oracle-data: